<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quản lý lớp học</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: "Be Vietnam Pro", system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }</style>
</head>
<body data-page="admin-classes" class="bg-slate-50 text-slate-900">
  <div class="min-h-screen flex">
    <aside class="w-64 bg-white border-r border-slate-200 p-4">
      <div class="mb-4">
        <div class="text-xs font-semibold text-slate-500">Cổng giáo viên</div>
        <div class="text-lg font-extrabold"><a class="hover:underline" href="index.html">AI Exam Grading</a></div>
      </div>
      <div id="current-user-label" class="text-xs text-slate-600 mb-3">Chưa đăng nhập</div>
      <nav class="space-y-1" id="nav"></nav>
      <div class="mt-6 pt-4 border-t border-slate-200">
        <button class="js-logout w-full px-3 py-2 rounded-lg border border-slate-300 hover:bg-white bg-slate-100 text-sm font-semibold">Đăng xuất</button>
      </div>
    </aside>

    <main class="flex-1 p-6">
      <div class="max-w-5xl mx-auto space-y-6">
        <header class="bg-white border border-slate-200 rounded-2xl p-5 flex flex-col lg:flex-row gap-4 items-start lg:items-center justify-between">
          <div>
            <div class="text-xs font-semibold text-slate-500">Quản lý danh mục</div>
            <h1 class="text-2xl font-extrabold mt-1">Lớp học</h1>
            <p class="text-sm text-slate-600 mt-1">Thêm, sửa, xóa lớp học trong hệ thống.</p>
          </div>
          <div class="flex items-center gap-3">
            <div id="global-message" class="text-sm"></div>
            <button id="add-class-btn" class="px-4 py-2 rounded-lg bg-slate-900 text-white text-sm font-semibold">+ Thêm lớp</button>
          </div>
        </header>

        <section class="bg-white border border-slate-200 rounded-2xl">
          <div class="p-4 overflow-auto">
            <table class="min-w-full text-sm">
              <thead class="text-left text-slate-500 border-b border-slate-100">
                <tr>
                  <th class="pb-3 pr-4 font-semibold">Mã lớp</th>
                  <th class="pb-3 pr-4 font-semibold">Tên lớp</th>
                  <th class="pb-3 pr-4 font-semibold">Khối</th>
                  <th class="pb-3 pr-4 font-semibold">Trạng thái</th>
                  <th class="pb-3 pr-4 font-semibold w-32">Thao tác</th>
                </tr>
              </thead>
              <tbody id="classes-tbody" class="divide-y divide-slate-100"></tbody>
            </table>
          </div>
          <div id="classes-pagination" class="px-4 pb-4 flex items-center justify-between flex-wrap gap-2"></div>
        </section>
      </div>
    </main>
  </div>

  <!-- Modal -->
  <div id="modal" class="fixed inset-0 hidden z-50">
    <div class="absolute inset-0 bg-black/40"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4">
      <div class="w-full max-w-md bg-white rounded-2xl shadow-xl border border-slate-200">
        <div class="p-4 border-b border-slate-200 flex items-center justify-between">
          <div>
            <div id="modal-title" class="font-extrabold"></div>
            <div id="modal-subtitle" class="text-sm text-slate-600"></div>
          </div>
          <button id="modal-close" class="px-3 py-1.5 rounded-lg border border-slate-300 hover:bg-slate-50 text-sm font-semibold">Đóng</button>
        </div>
        <form id="modal-form" class="p-4 space-y-4"></form>
        <div class="p-4 border-t border-slate-200 flex justify-end gap-2">
          <button id="modal-cancel" type="button" class="px-3 py-2 rounded-lg border border-slate-300 hover:bg-slate-50 text-sm font-semibold">Hủy</button>
          <button type="submit" form="modal-form" class="px-3 py-2 rounded-lg bg-slate-900 text-white text-sm font-semibold">Lưu</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app-state.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/layout.js"></script>
  <script src="js/admin.js"></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      AdminApp.initClasses().catch((e) => AdminApp.setGlobalMessage(e.message, 'error'));
    });
  </script>
</body>
</html>
